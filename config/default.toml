[model]
model_id             = "facebook/opt-13b"
sweep_model_id       = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
small_model_id       = "llama3.2:1b"        # Ollama tag for sanity baseline
precision            = "fp16"               # fp16 | 8bit | 4bit
max_new_tokens       = 20
layer_shards_path    = "~/airllm_cache"

[benchmark]
repetitions          = 3
seed                 = 42
num_threads          = 4
prompt_set           = [
    "Explain what a transformer is in two sentences.",
    "What is the capital of France?",
    "Write a haiku about memory.",
]

[economics]
hardware_capex       = 1999.0
hardware_life_months = 36
maintenance_monthly  = 10.0
cloud_gpu_hourly     = 2.50
in_out_token_ratio   = 0.3
tokens_per_request   = 500

[rate_limits]
# Maximum inference requests allowed per minute (local + remote backends combined)
max_requests_per_minute = 10
# Hard cap on tokens generated per single request — prevents runaway generation
max_tokens_per_request  = 2048
# In-memory queue depth before new requests are rejected (HTTP 429)
queue_size              = 100
# Seconds a caller must wait after being rate-limited before retrying
retry_after_seconds     = 60
# Per-day HF Hub API call budget (download manifest checks count against this)
hf_api_calls_per_day    = 200
